<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms - all about the forms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="a">
    <form action="post">
        <div>
            <label for="username">username</label>
            <input type="text" id="username" placeholder="enter your username" required autofocus>
        </div>
        <div>
            <label for="email">email</label>
            <input type="email" id="email" placeholder="enter your email here" required autofocus>
        </div>
        <div>
            <label for="number">number</label>
            <input type="number" id="number" placeholder="enter your number here" required autofocus>
        </div>
        <div>
            <label for="male">male</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="female">female</label>
            <input type="radio" id="mail" name="gender" value="female">
        </div>
        <div>
            <label for="subscribe">subscribe</label>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
        </div>
        <div>
            <label for="addres">address</label><br>
            <textarea name="addres" id="addres" placeholder="enter your address here" rows="4" cols="50"></textarea>
        </div>

        <div>
            <select name="branch" id="branch">
                <option value="branch">branch</option>
                <option value="CE">CE</option>
                <option value="CSE">CSE</option>
                <option value="IT">IT</option>
                <option value="CS">CS</option>
            </select>
        </div><br>

        <div>
            <button type="submit">submit your form</button>
        </div>
    </form>
    </div>
</body>

</html>
